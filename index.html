<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Agency Sim</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        font-family: system-ui, sans-serif;
      }
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      /* UI overlay sits on top of the canvas; individual UI panels enable pointer events as needed */
      #ui-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
      <div id="ui-overlay"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
