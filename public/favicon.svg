<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark sky background -->
  <circle cx="32" cy="32" r="31" fill="#0a1628" stroke="#2a5a9a" stroke-width="2"/>

  <!-- Stars -->
  <circle cx="12" cy="14" r="1.2" fill="#fff" opacity="0.8"/>
  <circle cx="50" cy="10" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="54" cy="42" r="1.1" fill="#fff" opacity="0.7"/>
  <circle cx="8" cy="46" r="0.9" fill="#fff" opacity="0.5"/>
  <circle cx="22" cy="8" r="0.8" fill="#fff" opacity="0.6"/>

  <!-- Rocket body -->
  <g transform="translate(32,32)">
    <!-- Exhaust flame -->
    <path d="M-3.5,14 Q0,26 3.5,14" fill="#ff6020" opacity="0.9"/>
    <path d="M-2,14 Q0,22 2,14" fill="#ffc040" opacity="0.9"/>

    <!-- Fins -->
    <path d="M-5,10 L-11,16 L-5,13 Z" fill="#2a5a9a"/>
    <path d="M5,10 L11,16 L5,13 Z" fill="#2a5a9a"/>

    <!-- Body -->
    <path d="M-5,-8 L-5,14 L5,14 L5,-8 Q5,-10 0,-18 Q-5,-10 -5,-8 Z" fill="#d0e0f0"/>

    <!-- Body stripe -->
    <rect x="-5" y="2" width="10" height="3" fill="#1a4878"/>

    <!-- Nose highlight -->
    <path d="M0,-18 Q-3,-12 -4,-8 L-1,-8 Q-1,-12 0,-18 Z" fill="#fff" opacity="0.25"/>

    <!-- Window -->
    <circle cx="0" cy="-4" r="2.5" fill="#1a3050" stroke="#80b8e8" stroke-width="0.8"/>
    <circle cx="-0.5" cy="-4.5" r="0.8" fill="#80b8e8" opacity="0.4"/>
  </g>
</svg>
